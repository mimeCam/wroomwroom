<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>openloop — knowledge files</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="styles.css" />
        <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.6/ace.js"></script>
        <style>
            .files-page {
                background: var(--bg-primary);
            }
            .files-layout {
                display: flex;
                flex-direction: column;
                height: 100vh;
                overflow: hidden;
            }
            .files-header {
                background: var(--bg-secondary);
                border-bottom: 1px solid var(--border-light);
                padding: 14px 24px;
                display: flex;
                align-items: center;
                gap: 12px;
                flex-shrink: 0;
            }
            .files-header h2 {
                font-size: 14px;
                font-weight: 500;
                color: var(--text-primary);
            }
            .files-header .tag {
                background: var(--accent-glow);
                color: var(--accent-primary);
                padding: 2px 8px;
                border-radius: var(--radius-sm);
                font-size: 11px;
                font-weight: 500;
            }
            .files-body {
                display: flex;
                flex: 1;
                min-height: 0;
            }
            .files-sidebar {
                width: 260px;
                min-width: 260px;
                background: var(--bg-secondary);
                border-right: 1px solid var(--border-light);
                display: flex;
                flex-direction: column;
                overflow: hidden;
            }
            .files-sidebar.hidden {
                display: none;
            }
            .files-sidebar-toolbar {
                padding: 12px;
                border-bottom: 1px solid var(--border-light);
            }
            .new-file-btn {
                width: 100%;
                background: var(--bg-tertiary);
                border: 1px solid var(--border-light);
                border-radius: var(--radius-md);
                color: var(--text-secondary);
                padding: 10px 14px;
                font-size: 12px;
                font-family: var(--font-body);
                cursor: pointer;
                transition: all var(--transition-fast);
                text-align: left;
            }
            .new-file-btn:hover {
                border-color: var(--accent-primary);
                color: var(--accent-primary);
                background: var(--accent-glow);
            }
            .new-file-inline {
                padding: 8px 12px;
                border-bottom: 1px solid var(--border-light);
                display: flex;
                gap: 6px;
                align-items: center;
            }
            .new-file-inline input {
                flex: 1;
                background: var(--bg-tertiary);
                border: 1px solid var(--border-medium);
                border-radius: var(--radius-sm);
                color: var(--text-primary);
                padding: 6px 10px;
                font-size: 12px;
                font-family: var(--font-mono);
                outline: none;
                transition: border-color var(--transition-fast);
            }
            .new-file-inline input:focus {
                border-color: var(--accent-primary);
            }
            .new-file-inline input::placeholder {
                color: var(--text-faint);
            }
            .new-file-inline button {
                background: none;
                border: 1px solid var(--border-light);
                border-radius: 4px;
                cursor: pointer;
                padding: 4px 8px;
                font-size: 12px;
                font-family: var(--font-body);
                transition: all var(--transition-fast);
            }
            .new-file-inline .confirm-btn {
                color: var(--accent-primary);
            }
            .new-file-inline .confirm-btn:hover {
                background: var(--accent-glow);
                border-color: var(--accent-primary);
            }
            .new-file-inline .cancel-btn {
                color: var(--text-muted);
            }
            .new-file-inline .cancel-btn:hover {
                background: var(--bg-tertiary);
            }
            .file-list {
                flex: 1;
                overflow-y: auto;
                padding: 8px;
                display: flex;
                flex-direction: column;
                gap: 4px;
            }
            .file-item {
                display: flex;
                align-items: center;
                padding: 8px 12px;
                background: var(--bg-tertiary);
                border: 1px solid transparent;
                border-radius: var(--radius-sm);
                cursor: pointer;
                transition: all var(--transition-fast);
                gap: 8px;
            }
            .file-item:hover {
                border-color: var(--border-medium);
            }
            .file-item.active {
                background: var(--accent-glow);
                border-color: var(--accent-primary);
                border-left: 2px solid var(--accent-primary);
            }
            .file-item.active .file-name {
                color: var(--text-primary);
            }
            .file-name {
                flex: 1;
                font-size: 13px;
                font-family: var(--font-mono);
                color: var(--text-secondary);
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }
            .file-delete-btn {
                background: none;
                border: none;
                color: var(--text-faint);
                cursor: pointer;
                font-size: 14px;
                padding: 0 4px;
                opacity: 0;
                transition: all var(--transition-fast);
                line-height: 1;
            }
            .file-item:hover .file-delete-btn {
                opacity: 1;
            }
            .file-delete-btn:hover {
                color: #ef4444;
            }
            .file-delete-confirm {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 8px 12px;
                background: rgba(239, 68, 68, 0.04);
                border: 1px solid rgba(239, 68, 68, 0.15);
                border-radius: var(--radius-sm);
                font-size: 12px;
                color: var(--text-secondary);
            }
            .file-delete-confirm button {
                background: none;
                border: 1px solid var(--border-light);
                border-radius: 4px;
                padding: 3px 10px;
                font-size: 11px;
                cursor: pointer;
                font-family: var(--font-body);
                transition: all var(--transition-fast);
            }
            .file-delete-confirm .del-confirm-yes {
                background: #ef4444;
                border-color: #ef4444;
                color: white;
            }
            .file-delete-confirm .del-confirm-yes:hover {
                background: #dc2626;
            }
            .file-delete-confirm .del-confirm-no {
                color: var(--text-muted);
            }
            .file-delete-confirm .del-confirm-no:hover {
                background: var(--bg-tertiary);
            }
            .editor-panel {
                flex: 1;
                display: flex;
                flex-direction: column;
                min-width: 0;
                position: relative;
                background: var(--bg-primary);
            }
            .editor-empty {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                height: 100%;
                color: var(--text-faint);
                text-align: center;
                gap: 4px;
            }
            .editor-empty-icon {
                font-size: 20px;
                margin-bottom: 4px;
                color: var(--text-muted);
            }
            .editor-empty-title {
                font-size: 15px;
                font-weight: 500;
                color: var(--text-secondary);
            }
            .editor-empty-sub {
                font-size: 13px;
            }
            .editor-no-files {
                position: absolute;
                inset: 0;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                text-align: center;
                z-index: 5;
            }
            .editor-no-files-icon {
                font-size: 32px;
                margin-bottom: 12px;
            }
            .editor-no-files-title {
                font-size: 15px;
                font-weight: 500;
                color: var(--text-secondary);
                margin-bottom: 6px;
            }
            .editor-no-files-desc {
                font-size: 13px;
                color: var(--text-faint);
                max-width: 280px;
                line-height: 1.5;
            }
            #ace-editor {
                flex: 1;
                width: 100%;
            }
            .save-bar {
                position: absolute;
                bottom: 0;
                left: 0;
                right: 0;
                background: var(--bg-secondary);
                border-top: 1px solid var(--border-light);
                padding: 10px 24px;
                display: flex;
                align-items: center;
                justify-content: space-between;
                transform: translateY(100%);
                opacity: 0;
                transition: transform 0.2s ease, opacity 0.2s ease;
                z-index: 10;
            }
            .save-bar.visible {
                transform: translateY(0);
                opacity: 1;
            }
            .save-bar-left {
                display: flex;
                align-items: center;
                gap: 8px;
                font-size: 12px;
                color: var(--text-secondary);
            }
            .save-bar-left .dot {
                width: 8px;
                height: 8px;
                border-radius: 50%;
                background: #f59e0b;
                animation: savePulse 2s ease infinite;
            }
            @keyframes savePulse {
                0%, 100% { opacity: 1; }
                50% { opacity: 0.4; }
            }
            .save-btn {
                background: var(--accent-primary);
                color: white;
                border: none;
                border-radius: var(--radius-md);
                padding: 8px 28px;
                font-size: 13px;
                font-weight: 500;
                font-family: var(--font-body);
                cursor: pointer;
                transition: all var(--transition-fast);
            }
            .save-btn:hover {
                filter: brightness(1.1);
                box-shadow: 0 0 20px var(--accent-glow);
            }
            .save-btn:active {
                transform: scale(0.97);
            }
            .save-btn.saving {
                opacity: 0.7;
                cursor: wait;
            }
            .save-btn.saved {
                background: #22c55e;
            }
            .save-btn.error {
                background: #ef4444;
            }
        </style>
    </head>
    <body class="files-page">
        <div class="files-layout">
            <div class="files-header">
                <h2>Knowledge files</h2>
                <span class="tag" id="personaTag"></span>
                <span class="tag" id="instanceTag"></span>
            </div>
            <div class="files-body">
                <div class="files-sidebar hidden" id="sidebar">
                    <div class="files-sidebar-toolbar">
                        <button class="new-file-btn" id="newFileBtn">+ New file</button>
                    </div>
                    <div id="newFileInline"></div>
                    <div class="file-list" id="fileList"></div>
                </div>
                <div class="editor-panel" id="editorPanel">
                    <div class="editor-no-files" id="noFilesState">
                        <div class="editor-no-files-icon">📁</div>
                        <div class="editor-no-files-title">No knowledge files yet</div>
                        <div class="editor-no-files-desc">Add knowledge files that this persona can reference.</div>
                    </div>
                    <div class="editor-empty" id="editorEmpty" style="display:none;">
                        <div class="editor-empty-icon">←</div>
                        <div class="editor-empty-title">Select a file to edit</div>
                        <div class="editor-empty-sub">Choose a file from the sidebar, or create a new one</div>
                    </div>
                    <div id="ace-editor" style="display:none;"></div>
                    <div class="save-bar" id="saveBar">
                        <div class="save-bar-left">
                            <span class="dot"></span>
                            <span>Unsaved changes</span>
                        </div>
                        <button class="save-btn" id="saveBtn">Save</button>
                    </div>
                </div>
            </div>
        </div>
        <script src="files.js"></script>
    </body>
</html>
