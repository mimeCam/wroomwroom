<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>OpenLoop Instances</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="styles.css" />
        <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
        <script src="app.js"></script>
    </head>
    <body>
        <header class="toolbar">
            <div class="toolbar-left">
                <button id="refreshBtn" class="icon-btn" title="Refresh">
                    <svg viewBox="0 0 24 24" width="16" height="16">
                        <path
                            fill="currentColor"
                            d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"
                        />
                    </svg>
                    <span id="refreshCountdown" class="countdown"></span>
                </button>
            </div>
            <div class="toolbar-center">
                <div
                    class="lang-switcher"
                    role="group"
                    aria-label="Language selection"
                >
                    <button
                        class="lang-btn active"
                        data-lang="en"
                        aria-label="Switch to English"
                        aria-pressed="true"
                    >
                        🇬🇧
                    </button>
                    <button
                        class="lang-btn"
                        data-lang="fr"
                        aria-label="Passer au français"
                        aria-pressed="false"
                    >
                        🇫🇷
                    </button>
                </div>
            </div>
            <div class="toolbar-right">
                <span class="app-title">openloop</span>
                <a
                    href="https://svenai.com"
                    class="app-subtitle"
                    target="_blank"
                    rel="noopener noreferrer"
                    >so dreamers can dream</a
                >
                <span class="app-version">version 1.0</span>
            </div>
        </header>
        <div class="container">
            <main id="content" class="instances-container">
                <div class="loading">
                    Loading instances...
                    <div class="loading-hint">
                        To launch an instance, run <code>openloop</code> from
                        your project folder in the terminal
                    </div>
                </div>
            </main>
        </div>
        <div
            id="help-panel"
            class="help-panel"
            role="dialog"
            aria-label="Help panel"
            aria-modal="true"
        >
            <div class="help-panel-header">
                <button
                    id="help-panel-open-tab"
                    class="help-panel-open-tab"
                    aria-label="Open documentation in new tab"
                    title="Open full documentation in new tab"
                >
                    <svg viewBox="0 0 24 24" width="18" height="18">
                        <path fill="currentColor" d="M19 19H5V5h7V3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2v-7h-2v7zM14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3h-7z"/>
                    </svg>
                </button>
                <button
                    id="help-panel-close"
                    class="help-panel-close"
                    aria-label="Close help"
                >
                    &times;
                </button>
            </div>
            <div id="help-panel-content" class="help-panel-content"></div>
        </div>
        <div id="help-backdrop" class="help-backdrop"></div>
    </body>
</html>
